name: setup-publisher
description: Install Freecam Publisher

inputs:
  install_to_path:
    description: Add the executables to the PATH
    required: true
    default: 'true'
  github_token:
    description: GitHub token (defaults to GITHUB_TOKEN)
    required: false

outputs:
  version:
    description: The version that was installed
    value: ${{ steps.version.outputs.version }}
  path:
    description: Path to the Publisher executable
    value: ${{ steps.resolve.outputs.path }}

runs:
  using: composite
  steps:
    - name: Create working directory
      shell: python
      run: |
        "Create working directory"

        from tempfile import mkdtemp
        from os import environ

        with open(environ["GITHUB_ENV"], "a") as env:
            print(f"WORK_DIR={mkdtemp()}", file=env)

    - name: Read version from gradle.properties
      id: version
      shell: python
      run: |
        "Read version from gradle.properties"

        import os
        from pathlib import Path

        def find_file() -> Path:
            action_path = os.environ.get("GITHUB_ACTION_PATH")
            if action_path:
                p = Path(action_path) / "gradle.properties"
                if p.is_file():
                    return p

            p = Path("gradle.properties")
            if p.is_file():
                return p

            raise SystemExit("::error::gradle.properties not found")

        def read_version(path: Path) -> str:
            with path.open() as f:
                for raw in f:
                    line = raw.strip()
                    if not line or line.startswith(("#", "!")):
                        continue

                    key, sep, value = line.partition("=")
                    if sep and key.strip() == "version":
                        return value.lstrip(" ")

            raise SystemExit(f"::error::Failed to parse version")

        file = find_file()
        version = read_version(file)

        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            print(f"version={version}", file=out)

        with open(os.environ["GITHUB_ENV"], "a") as env:
            print(f"PUBLISHER_VERSION={version}", file=env)

    - name: Download release asset
      id: asset
      shell: python
      run: |
        "Download release asset"

        from hashlib import sha256
        from os import environ
        from pathlib import Path
        from urllib.request import urlopen
        from urllib.error import HTTPError, URLError

        version = environ["PUBLISHER_VERSION"]
        name = f"freecam-publish-{version}.tar.gz"
        sha_name = f"{name}.sha256"

        assets_url = f"https://github.com/MinecraftFreecam/Publisher/releases/download/v{version}"
        archive_url = f"{assets_url}/{name}"
        archive_path = Path(environ["WORK_DIR"]) / name
        sha_url = f"{assets_url}/{sha_name}"

        # Fetch expected checksum
        print(f"Downloading SHA-256 checksum: {sha_url}")
        try:
          with urlopen(sha_url, timeout=30) as r:
            expected = r.read().decode().strip().split()[0]
        except HTTPError as e:
          if e.code == 404:
            raise SystemExit(f"::error::SHA-256 checksum not found: {sha_url}")
          raise SystemExit(f"::error::Failed to download {sha_url} (HTTP {e.code})")
        except URLError as e:
          raise SystemExit(f"::error::Failed to download {sha_url}: {e.reason}")

        # Compute actual checksum while downloading archive
        print(f"Downloading archive: {archive_url}")
        digest = sha256()
        try:
          with urlopen(archive_url, timeout=30) as r, open(archive_path, "wb") as f:
            for chunk in iter(lambda: r.read(8192), b""):
              digest.update(chunk)
              f.write(chunk)
        except HTTPError as e:
          if e.code == 404:
            raise SystemExit(f"::error::Release asset not found: {archive_url}")
          raise SystemExit(f"::error::Failed to download {archive_url} (HTTP {e.code})")
        except URLError as e:
          raise SystemExit(f"::error::Failed to download {archive_url}: {e.reason}")
        actual = digest.hexdigest()

        if actual != expected:
          raise SystemExit(
              f"::error::SHA-256 hash mismatch for {name}"
              "%0A"
              f"Expected: {expected}"
              "%0A"
              f"Actual:   {actual}"
              "%0A"
              f"URL: {archive_url}"
          )

        with open(environ["GITHUB_ENV"], "a") as env:
            print(f"ARCHIVE_NAME={name}", file=env)
            print(f"ARCHIVE_PATH={archive_path}", file=env)

    - name: Extract archive
      shell: python
      run: |
        "Extract archive"

        import tarfile
        from os import environ

        with tarfile.open(environ["ARCHIVE_PATH"], "r:gz") as tar:
            tar.extractall(environ["WORK_DIR"], filter="tar")

    - name: Resolve executable path
      id: resolve
      shell: python
      run: |
        "Resolve executable path"

        import os
        from pathlib import Path

        version = os.environ["PUBLISHER_VERSION"]
        root = Path(os.environ["WORK_DIR"]) / f"freecam-publish-{version}"

        if os.environ["RUNNER_OS"] == "Windows":
            exe = root / "bin" / "freecam-publish.bat"
        else:
            exe = root / "bin" / "freecam-publish"

        if not exe.is_file():
            raise SystemExit(f"::error::Executable not found at {exe}")

        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            print(f"path={exe.resolve()}", file=out)

    - name: Install to PATH
      if: inputs.install_to_path == 'true'
      shell: python
      env:
        EXE_PATH: ${{ steps.resolve.outputs.path }}
      run: |
        "Install to PATH"

        from os import environ
        from pathlib import Path

        exe = Path(environ["EXE_PATH"])
        with open(environ["GITHUB_PATH"], "a") as gh_path:
          print(exe.parent, file=gh_path)
