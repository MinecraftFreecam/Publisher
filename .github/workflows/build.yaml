name: Build

on:
  push:
    branches: [ main ]
  pull_request:

# Group workflow runs by event and ref.
# New runs cancel any pending run.
# PR runs also cancel in-progress runs.
concurrency:
  group: build-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test API
        run: ./gradlew :api:build

      - name: Upload jars
        uses: actions/upload-artifact@v7
        with:
          name: api-jars
          path: api/build/libs/*.jar
          if-no-files-found: error

  publisher:
    name: Publisher
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6

      - name: Test app
        run: |
          ./gradlew :check \
            --exclude-task :api:test \
            --exclude-task :api:check

      - name: Build distributable app
        run: ./gradlew :distTar

      - name: Upload distributable app
        uses: actions/upload-artifact@v7
        with:
          path: build/distributions/*.tar
          archive: false
          if-no-files-found: error

  publish:
    name: Publish
    uses: ./.github/workflows/publish.yaml
    needs:
      - api
      - publisher
    permissions:
      contents: write
    with:
      dry_run: ${{ github.event_name != 'push' }}
      force: ${{ github.event_name != 'push' }}
